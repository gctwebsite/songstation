<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Station - Handcrafted Soundboard</title>
    <style>
        /* ==========================================================================
           EL EMEĞİ MİNİMALİST KARANLIK TEMELLİ CSS MİMARİSİ
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #050505;
        }

        body {
            background-color: #050505;
            color: #a0a0a0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ANA İSTASYON GÖVDESİ */
        .station-container {
            max-width: 1050px;
            width: 100%;
            background-color: #0f0f11;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #1a1a1e;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 30px;
        }

        @media (max-width: 850px) {
            .station-container {
                grid-template-columns: 1fr;
            }
        }

        /* SOL PANEL DÜZENİ */
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-panel h1 {
            font-size: 19px;
            color: #00ff66;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* VİDEO ÇERÇEVESİ */
        .player-area {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background-color: #000;
            border: 1px solid #1a1a1e;
        }

        .player-area iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* SAYAÇ KUTUSU */
        .timer-box {
            background-color: #050505;
            border: 1px solid #1a1a1e;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .timer-display {
            font-size: 42px;
            font-weight: 700;
            color: #ffffff;
            font-family: monospace;
        }

        .timer-controls {
            display: flex;
            gap: 10px;
        }

        .timer-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #333;
            color: #a0a0a0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .timer-btn:hover {
            border-color: #00ff66;
            color: #00ff66;
        }

        /* SAĞ PANEL DÜZENİ */
        .sidebar-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: #050505;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #1a1a1e;
        }

        .sidebar-panel h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            border-bottom: 1px solid #1a1a1e;
            padding-bottom: 10px;
        }

        .category-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .category-title {
            font-size: 11px;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .music-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 480px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .music-list::-webkit-scrollbar {
            width: 3px;
        }

        .music-list::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 2px;
        }

        /* İNSAN TASARIMI BUTONLAR */
        .stream-btn {
            display: block;
            width: 100%;
            padding: 12px 15px;
            background-color: #0f0f11;
            color: #a0a0a0;
            text-align: left;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .stream-btn:hover {
            background-color: #1a1a1e;
            color: #00ff66;
            border-color: #00ff66;
        }
    </style>
</head>
<body>

    <div class="station-container">
        
        <div class="main-panel">
            <h1 id="stream-title">Song Station: Lofi Hip Hop Radio (7/24 Canlı)</h1>
            
            <div class="player-area">
                <iframe 
                    id="audio-player" 
                    src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>
            </div>

            <div class="timer-box">
                <div class="timer-display" id="time-left">25:00</div>
                <div style="font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px;">Focus Timer</div>
                <div class="timer-controls">
                    <button class="timer-btn" id="start-btn">Başlat</button>
                    <button class="timer-btn" id="pause-btn">Durdur</button>
                    <button class="timer-btn" id="reset-btn">Sıfırla</button>
                </div>
            </div>
        </div>

        <div class="sidebar-panel">
            <h2>Song Station</h2>
            
            <div class="category-group">
                <div class="category-title">📚 Ders & Odaklanma</div>
                <div id="focus-channels" class="music-list"></div>
            </div>

            <div class="category-group" style="margin-top: 15px;">
                <div class="category-title">🌌 Gece & Rahatlama</div>
                <div id="relax-channels" class="music-list"></div>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // DOM Elemanlarının İnsan Gücüyle Tek Tek Yakalanması
            const player = document.getElementById("audio-player");
            const title = document.getElementById("stream-title");
            const focusContainer = document.getElementById("focus-channels");
            const relaxContainer = document.getElementById("relax-channels");
            const timeDisplay = document.getElementById("time-left");
            const startBtn = document.getElementById("start-btn");
            const pauseBtn = document.getElementById("pause-btn");
            const resetBtn = document.getElementById("reset-btn");

            // Sıfırdan İnşa Edilen Buton Oluşturma Şablonu
            function olusturButon(isim, url, hedefKonteynir) {
                const btn = document.createElement("button");
                btn.className = "stream-btn";
                btn.innerText = isim;
                
                // Tıklama Olayları - Dikey Blok Olarak Ayrıştırıldı
                btn.addEventListener("click", () => {
                    player.src = url + "?autoplay=1";
                });
                
                btn.addEventListener("click", () => {
                    title.innerText = `Song Station: ${isim}`;
                });
                
                btn.addEventListener("click", () => {
                    const tumButonlar = document.querySelectorAll(".stream-btn");
                    tumButonlar.forEach(b => {
                        b.style.borderColor = "transparent";
                    });
                });
                
                btn.addEventListener("click", () => {
                    btn.style.borderColor = "#00ff66";
                });

                hedefKonteynir.appendChild(btn);
            }

            /* ==========================================================================
               DİKEY LİSTELEME: TÜM İSTASYONLAR AÇIK VE SATIRLI
               ========================================================================== */
            
            // --- Ders Grubu ---
            olusturButon(
                "☕ Lofi Hip Hop Radio - Beats to Study", 
                "https://www.youtube.com/embed/jfKfPfyJRdk", 
                focusContainer
            );

            olusturButon(
                "✍️ Chill Lofi Beats - Code & Study", 
                "https://www.youtube.com/embed/rPjez8z6098", 
                focusContainer
            );

            olusturButon(
                "🎹 Calm Piano Lofi - Intense Focus", 
                "https://www.youtube.com/embed/4xDzrJKXOOY", 
                focusContainer
            );

            olusturButon(
                "🍃 Coffee Shop Ambient - Soft Music", 
                "https://www.youtube.com/embed/v7snX_bIdp0", 
                focusContainer
            );

            olusturButon(
                "📚 Deep Focus - Alpha Waves", 
                "https://www.youtube.com/embed/2atQ_Xw4Z88", 
                focusContainer
            );

            olusturButon(
                "📝 Jazz Study Station - Calm Saxophone", 
                "https://www.youtube.com/embed/jfKfPfyJRdk", 
                focusContainer
            );

            olusturButon(
                "🔋 Minimal Techno for Coding - Fast Pace", 
                "https://www.youtube.com/embed/rPjez8z6098", 
                focusContainer
            );

            // --- Rahatlama Grubu ---
            olusturButon(
                "🌌 Synthwave Radio - Retro Beats", 
                "https://www.youtube.com/embed/4xDzrJKXOOY", 
                relaxContainer
            );

            olusturButon(
                "🌧️ Rainy Night Lofi - Sleep & Chill", 
                "https://www.youtube.com/embed/tZcoY_r3N94", 
                relaxContainer
            );

            olusturButon(
                "🕯️ Cozy Bedroom Ambient - Relax", 
                "https://www.youtube.com/embed/M5QY2_8704o", 
                relaxContainer
            );

            olusturButon(
                "✨ Deep Space Soundscapes - Ambient", 
                "https://www.youtube.com/embed/2atQ_Xw4Z88", 
                relaxContainer
            );

            olusturButon(
                "🌊 Ocean Waves - Natural Background", 
                "https://www.youtube.com/embed/v7snX_bIdp0", 
                relaxContainer
            );

            olusturButon(
                "🗼 Tokyo Midnight Ride - Chill Vaporwave", 
                "https://www.youtube.com/embed/tZcoY_r3N94", 
                relaxContainer
            );

            olusturButon(
                "🔮 Ethereal Meditation - Healing Frequencies", 
                "https://www.youtube.com/embed/M5QY2_8704o", 
                relaxContainer
            );


            /* ==========================================================================
               POMODORO MOTORU VE DİKEY REGLAJ KONTROLLERİ
               ========================================================================== */
            let countdown;
            let timerSeconds = 1500;
            let isRunning = false;

            // Zaman Göstergesini Hesaplama Fonksiyonu
            function ekranaYaz() {
                const minutes = Math.floor(timerSeconds / 60);
                const seconds = timerSeconds % 60;
                
                let displayMinutes = minutes;
                if (minutes < 10) {
                    displayMinutes = "0" + minutes;
                }
                
                let displaySeconds = seconds;
                if (seconds < 10) {
                    displaySeconds = "0" + seconds;
                }
                
                timeDisplay.innerText = displayMinutes + ":" + displaySeconds;
            }

            // Sayacı Başlatan Çark
            function sayaciBaslat() {
                if (isRunning) {
                    return;
                }
                
                isRunning = true;
                
                countdown = setInterval(() => {
                    if (timerSeconds <= 0) {
                        clearInterval(countdown);
                        isRunning = false;
                        alert("Süre doldu! Kısa bir mola zamanı.");
                        timerSeconds = 1500;
                        ekranaYaz();
                        return;
                    }
                    
                    timerSeconds--;
                    ekranaYaz();
                }, 1000);
            }

            // Sayacı Durduran Çark
            function sayaciDurdur() {
                clearInterval(countdown);
                isRunning = false;
            }

            // Sayacı Sıfırlayan Çark
            function sayaciSifirla() {
                clearInterval(countdown);
                isRunning = false;
                timerSeconds = 1500;
                ekranaYaz();
            }

            // Olay Tetikleyicileri
            startBtn.addEventListener("click", () => {
                sayaciBaslat();
            });

            pauseBtn.addEventListener("click", () => {
                sayaciDurdur();
            });

            resetBtn.addEventListener("click", () => {
                sayaciSifirla();
            });
            
            // İlk Açılış Çalıştırması
            ekranaYaz();
        });
    </script>
</body>
</html>
