<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Station - Ultimate Focus Hub</title>
    <style>
        /* ==========================================================================
           HANDCRAFTED MINIMALIST DARK THEME STYLE SHEETS (CSS)
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #050505;
        }

        body {
            background-color: #050505;
            color: #a0a0a0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* FLEXIBLE RESPONSIVE GRID GRID SYSTEM */
        .station-container {
            max-width: 1200px;
            width: 100%;
            background-color: #0f0f11;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #1a1a1e;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
        }

        /* RESPONSIVE LAYOUT ADJUSTMENTS FOR LAPTOPS AND TABLETS */
        @media (max-width: 1024px) {
            .station-container {
                grid-template-columns: 1fr 340px;
                gap: 20px;
                padding: 20px;
            }
        }

        /* RESPONSIVE LAYOUT ADJUSTMENTS FOR PORTRAIT TABLETS & SMARTPHONES */
        @media (max-width: 850px) {
            .station-container {
                grid-template-columns: 1fr;
                gap: 25px;
                padding: 15px;
            }
        }

        /* RESPONSIVE LAYOUT ADJUSTMENTS FOR SMALL MOBILE DEVICES */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .station-container {
                padding: 12px;
                border-radius: 12px;
            }
            .main-panel h1 {
                font-size: 16px !important;
            }
            .timer-display {
                font-size: 32px !important;
            }
        }

        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-panel h1 {
            font-size: 19px;
            color: #00ff66;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* FLUID VIDEO COMPONENT MATRIX */
        .player-area {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background-color: #000;
            border: 1px solid #1a1a1e;
        }

        .player-area iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .timer-box {
            background-color: #050505;
            border: 1px solid #1a1a1e;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .timer-display {
            font-size: 42px;
            font-weight: 700;
            color: #ffffff;
            font-family: monospace;
        }

        .timer-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .timer-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #333;
            color: #a0a0a0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .timer-btn:hover {
            border-color: #00ff66;
            color: #00ff66;
        }

        .sidebar-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: #050505;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #1a1a1e;
        }

        .sidebar-panel h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            border-bottom: 1px solid #1a1a1e;
            padding-bottom: 10px;
        }

        .category-title {
            font-size: 11px;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
            margin-bottom: 5px;
            padding-left: 2px;
        }

        .music-list-wrapper {
            max-height: 580px;
            overflow-y: auto;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        @media (max-width: 850px) {
            .music-list-wrapper {
                max-height: 400px;
            }
        }

        .music-list-wrapper::-webkit-scrollbar {
            width: 3px;
        }

        .music-list-wrapper::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 2px;
        }

        .channel-row {
            display: flex;
            gap: 5px;
            width: 100%;
        }

        .stream-btn {
            flex: 1;
            padding: 12px 15px;
            background-color: #0f0f11;
            color: #a0a0a0;
            text-align: left;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stream-btn:hover {
            background-color: #1a1a1e;
            color: #00ff66;
            border-color: #00ff66;
        }

        .external-link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
            background-color: #0f0f11;
            color: #444;
            border: 1px solid transparent;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .external-link-btn:hover {
            color: #ff3333;
            background-color: #1a1a1e;
            border-color: #ff3333;
        }
    </style>
</head>
<body>

    <div class="station-container">
        
        <div class="main-panel">
            <h1 id="stream-title">Song Station: 📚 Lofi Study Beats (Classic)</h1>
            
            <div class="player-area">
                <iframe 
                    id="audio-player" 
                    src="https://www.youtube.com/embed/5qap5aO4i9A?autoplay=1" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>
            </div>

            <div class="timer-box">
                <div class="timer-display" id="time-left">25:00</div>
                <div style="font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px;">Focus Timer</div>
                <div class="timer-controls">
                    <button class="timer-btn" id="start-btn">Start</button>
                    <button class="timer-btn" id="pause-btn">Pause</button>
                    <button class="timer-btn" id="reset-btn">Reset</button>
                </div>
            </div>
        </div>

        <div class="sidebar-panel">
            <h2>Song Station</h2>
            
            <div id="dynamic-categories" class="music-list-wrapper">
                </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            const player = document.getElementById("audio-player");
            const title = document.getElementById("stream-title");
            const categoriesContainer = document.getElementById("dynamic-categories");
            
            const timeDisplay = document.getElementById("time-left");
            const startBtn = document.getElementById("start-btn");
            const pauseBtn = document.getElementById("pause-btn");
            const resetBtn = document.getElementById("reset-btn");

            // Category title header rendering block
            function addCategoryHeader(categoryName) {
                const t = document.createElement("div");
                t.className = "category-title";
                t.innerText = categoryName;
                categoriesContainer.appendChild(t);
            }

            // Handcrafted Button Core Engine
            function buildStationButton(stationName, youtubeId) {
                const row = document.createElement("div");
                row.className = "channel-row";

                const btn = document.createElement("button");
                btn.className = "stream-btn";
                btn.innerText = stationName;

                const extLink = document.createElement("a");
                extLink.className = "external-link-btn";
                extLink.innerHTML = "↗";
                extLink.href = "https://www.youtube.com/watch?v=" + youtubeId;
                extLink.target = "_blank";
                
                btn.addEventListener("click", () => {
                    player.src = "https://www.youtube.com/embed/" + youtubeId + "?autoplay=1";
                });
                
                btn.addEventListener("click", () => {
                    title.innerText = `Song Station: ${stationName}`;
                });
                
                btn.addEventListener("click", () => {
                    const allButtons = document.querySelectorAll(".stream-btn");
                    allButtons.forEach(b => {
                        b.style.borderColor = "transparent";
                    });
                });
                
                btn.addEventListener("click", () => {
                    btn.style.borderColor = "#00ff66";
                });

                row.appendChild(btn);
                row.appendChild(extLink);
                categoriesContainer.appendChild(row);
            }

            /* ==========================================================================
               FULL MAXIMUM EXTENDED CATEGORIES DIRECTORY (VERTICAL ENTRIES)
               ========================================================================== */
            
            // --- CATEGORY 1 ---
            addCategoryHeader("📚 Lofi & Academic Study");
            buildStationButton("☕ Lofi Study Beats (Classic)", "5qap5aO4i9A");
            buildStationButton("✍️ Coding Chill Session", "9FvvbVI5rRE");
            buildStationButton("🎹 Calm Piano Lofi Relax", "4xDzrJKXOOY");
            buildStationButton("🍃 Coffee Shop Background", "v7snX_bIdp0");
            buildStationButton("📖 Vintage Library Vibe", "CHFif_y2TyM");
            buildStationButton("🎒 Late Night Homework", "tZcoY_r3N94");
            buildStationButton("📝 Soft Rain & Study Lofi", "mPZkdNFkNps");
            buildStationButton("🛹 Sunset Skate Lofi Chill", "jfKfPfyJRdk");
            buildStationButton("🥐 Parisian Cafe Accordion", "L_LUpnjgPso");

            // --- CATEGORY 2 ---
            addCategoryHeader("🌌 Gaming & Focus (Synthwave)");
            buildStationButton("🏎️ Synthwave Outrun Radio", "4xDzrJKXOOY");
            buildStationButton("🌌 Neon Driving Beats", "tZcoY_r3N94");
            buildStationButton("👾 Retro Gaming Focus", "M5QY2_8704o");
            buildStationButton("🛸 Deep Space Arcade", "2atQ_Xw4Z88");
            buildStationButton("🕹️ Cyberpunk Glitch Coding", "9FvvbVI5rRE");
            buildStationButton("⚡ Dark Synthwave Horizon", "5qap5aO4i9A");
            buildStationButton("🌃 Tokyo Highway Night Drive", "v7snX_bIdp0");

            // --- CATEGORY 3 ---
            addCategoryHeader("🌧️ Nature & Atmosphere Ambient");
            buildStationButton("🌧️ Rain on Window (Soft)", "mPZkdNFkNps");
            buildStationButton("⛈️ Thunderstorm Sleeping", "nMfPqeZjc2c");
            buildStationButton("🌊 Calm Ocean Waves", "v7snX_bIdp0");
            buildStationButton("🔥 Crackling Fireplace Cozy", "L_LUpnjgPso");
            buildStationButton("🌲 Deep Forest Wind & Birds", "2atQ_Xw4Z88");
            buildStationButton("🏔️ Blizzard Storm & Cabin Wind", "CHFif_y2TyM");
            buildStationButton("🎋 Kyoto Bamboo Forest Rain", "9FvvbVI5rRE");

            // --- CATEGORY 4 ---
            addCategoryHeader("🔮 Deep Focus Brainwaves");
            buildStationButton("🧠 Alpha Waves (Intense Focus)", "WPni755-URM");
            buildStationButton("✨ Binaural Beats Study", "2atQ_Xw4Z88");
            buildStationButton("🧘 432Hz Healing Frequency", "M5QY2_8704o");
            buildStationButton("🌌 Deep Gamma Brain Waves", "tZcoY_r3N94");
            buildStationButton("🪐 Space Drone Meditation", "4xDzrJKXOOY");

            // --- CATEGORY 5 ---
            addCategoryHeader("🎷 Instrumental & Jazz & Classical");
            buildStationButton("🎷 Midnight Jazz Lounge", "jfKfPfyJRdk");
            buildStationButton("🎻 Classical Masterpieces", "rPjez8z6098");
            buildStationButton("🎸 Acoustic Folk Guitar Vibe", "v7snX_bIdp0");
            buildStationButton("🎺 Smooth Bossa Nova Sound", "5qap5aO4i9A");
            buildStationButton("🌌 Dark Academia Cello", "CHFif_y2TyM");


            // ==========================================================================
            // POMODORO FOCUS TIMER SYSTEM MACHINERY
            // ==========================================================================
            let countdown;
            let timerSeconds = 1500;
            let isRunning = false;

            function updateTimerDisplay() {
                const minutes = Math.floor(timerSeconds / 60);
                const seconds = timerSeconds % 60;
                
                let displayMinutes = minutes;
                if (minutes < 10) {
                    displayMinutes = "0" + minutes;
                }
                
                let displaySeconds = seconds;
                if (seconds < 10) {
                    displaySeconds = "0" + seconds;
                }
                
                timeDisplay.innerText = displayMinutes + ":" + displaySeconds;
            }

            function startTimer() {
                if (isRunning) {
                    return;
                }
                isRunning = true;
                countdown = setInterval(() => {
                    if (timerSeconds <= 0) {
                        clearInterval(countdown);
                        isRunning = false;
                        alert("Time is up! Take a short break.");
                        timerSeconds = 1500;
                        updateTimerDisplay();
                        return;
                    }
                    timerSeconds--;
                    updateTimerDisplay();
                }, 1000);
            }

            function pauseTimer() {
                clearInterval(countdown);
                isRunning = false;
            }

            function resetTimer() {
                clearInterval(countdown);
                isRunning = false;
                timerSeconds = 1500;
                updateTimerDisplay();
            }

            startBtn.addEventListener("click", () => {
                startTimer();
            });

            pauseBtn.addEventListener("click", () => {
                pauseTimer();
            });

            resetBtn.addEventListener("click", () => {
                resetTimer();
            });
            
            updateTimerDisplay();
        });
    </script>
</body>
</html>
